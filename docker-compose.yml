services: 
  # 1. Banco da Aplicação
  cinema-db:
    build: .
    container_name: postgres-18
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata_v18:/var/lib/postgresql
      
volumes: 
  pgdata_v18: 